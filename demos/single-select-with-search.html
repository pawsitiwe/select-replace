<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Single Select Replace With Search Demo</title>
    <link rel="stylesheet" href="build/demo.css">
</head>
<body>
<div class="wrapper">
    <form>
        <div class="form-grid">
            <div>
                <label for="select-replace-1">Select 1 (Single)</label>
                <select id="select-replace-1">
                    <option value="">Please select …</option>
                    <option value="option-1">Option 1</option>
                    <option value="option-2">Option 2</option>
                    <option value="option-3">Option 3</option>
                    <option value="option-4">Option 4</option>
                    <option value="option-5">Option 5</option>
                </select>
            </div>
        </div>
    </form>
</div>
<script type="module">
    import { SelectReplace } from './build/demo.js';

    const selectReplace = new SelectReplace(document.querySelector('select'), {
        search: {
            enabled: true
        }
    });

    selectReplace.init();
</script>

</body>
</html>
